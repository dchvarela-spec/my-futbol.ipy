<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Standings</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 20px;}
        table {width: 100%; border-collapse: collapse;}
        th, td {border: 1px solid #ccc; padding: 8px; text-align: left;}
        th {background-color: #f2f2f2;}
    </style>
</head>
<body>
    <h1>Football Standings</h1>
    <table>
        <thead>
            <tr>
                <th>Team</th>
                <th>Played</th>
                <th>Won</th>
                <th>Drawn</th>
                <th>Lost</th>
                <th>Points</th>
            </tr>
        </thead>
        <tbody>
            <!-- Example Data -->
            <tr><td>Team A</td><td>10</td><td>6</td><td>2</td><td>2</td><td>20</td></tr>
            <tr><td>Team B</td><td>10</td><td>5</td><td>3</td><td>2</td><td>18</td></tr>
            <tr><td>Team C</td><td>10</td><td>4</td><td>4</td><td>2</td><td>16</td></tr>
        </tbody>
    </table>
</body>
</html>
